<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandbox — Notes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Notes</h1>
      <p class="subtitle">Firebase + Firestore demo</p>
    </header>

    <form id="note-form">
      <input type="text" id="note-input" placeholder="Skriv et notat..." autocomplete="off" required>
      <button type="submit">Legg til</button>
    </form>

    <ul id="notes-list"></ul>

    <footer>
      <p>Koblet til Firestore: <span id="status">venter...</span></p>
    </footer>
  </div>

  <!-- Firebase SDK (compat for enkelhet) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
<!-- deployed via GitHub Actions -->
